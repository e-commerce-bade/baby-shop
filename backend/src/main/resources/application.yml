spring:
  application:
    name: baby-shop-backend
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:babyshop}}}
    username: ${PGUSER:${DB_USERNAME:babyshop_user}}
    password: ${PGPASSWORD:${DB_PASSWORD:babyshop_password}}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BabyShopHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${PORT:${SERVER_PORT:5050}}

app:
  payment:
    mock:
      callback-secret: ${MOCK_PAYMENT_CALLBACK_SECRET:}
    iyzico:
      api-key: ${IYZICO_API_KEY:}
      secret-key: ${IYZICO_SECRET_KEY:}
      base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
      callback-url: ${IYZICO_CALLBACK_URL:}
      locale: ${IYZICO_LOCALE:tr}
      enabled-installments: ${IYZICO_ENABLED_INSTALLMENTS:1}
      force-three-ds: ${IYZICO_FORCE_THREE_DS:0}
      default-buyer-identity-number: ${IYZICO_DEFAULT_BUYER_IDENTITY_NUMBER:11111111111}
      default-buyer-ip: ${IYZICO_DEFAULT_BUYER_IP:127.0.0.1}
  security:
    # Asagidaki degerlerin commit'li bir varsayilani YOKTUR; ortam degiskeniyle saglanmalidir.
    # JWT secret en az 32 bayt olmali (SecurityConfig dogrular) ve verilmezse uygulama baslamaz.
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    admin:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      role: ${ADMIN_ROLE:ADMIN}
      bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    jwt:
      secret: ${JWT_SECRET:}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:120}
      issuer: ${JWT_ISSUER:baby-shop-backend}
