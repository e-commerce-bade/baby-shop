spring:
  application:
    name: baby-shop-backend
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:babyshop}}}
    username: ${PGUSER:${DB_USERNAME:babyshop_user}}
    password: ${PGPASSWORD:${DB_PASSWORD:babyshop_password}}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BabyShopHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Varsayilan 587 (STARTTLS). 587 engelliyse 465'i dene:
          # MAIL_PORT=465, MAIL_SSL=true, MAIL_STARTTLS=false.
          starttls:
            enable: ${MAIL_STARTTLS:true}
          ssl:
            enable: ${MAIL_SSL:false}
          connectiontimeout: ${MAIL_TIMEOUT_MS:10000}
          timeout: ${MAIL_TIMEOUT_MS:10000}
          writetimeout: ${MAIL_TIMEOUT_MS:10000}

server:
  port: ${PORT:${SERVER_PORT:5050}}

app:
  mail:
    # E-posta gonderimi yalnizca acikca etkinlestirilince yapilir (kimlik bilgileri ayarli olmali).
    enabled: ${MAIL_ENABLED:false}
    # "smtp" | "brevo". Railway giden SMTP'yi engelledigi icin prod'da "brevo" (HTTP API) kullanilir.
    provider: ${MAIL_PROVIDER:smtp}
    from: ${MAIL_FROM:Bade Bebe <badebebe001@gmail.com>}
    store-name: ${MAIL_STORE_NAME:Bade Bebe}
    track-base-url: ${MAIL_TRACK_BASE_URL:https://badebebe.net}
    brevo-api-key: ${MAIL_BREVO_API_KEY:}
  order:
    # Odenmeden bekleyen (PENDING) siparisin gecerlilik suresi; asilinca iptal edilip stok iade edilir.
    pending-expiry-minutes: ${ORDER_PENDING_EXPIRY_MINUTES:15}
    # Sure asimi kontrolunun calisma araligi (ms).
    expiry-check-interval-ms: ${ORDER_EXPIRY_CHECK_INTERVAL_MS:120000}
  payment:
    # Odeme sonrasi (iyzico callback) yonlendirilebilecek izinli origin'ler; acik yonlendirmeyi onler.
    allowed-redirect-origins: ${PAYMENT_ALLOWED_REDIRECT_ORIGINS:https://badebebe.net,https://www.badebebe.net,https://badebebe-frontend-production.up.railway.app,http://localhost:3000}
    mock:
      callback-secret: ${MOCK_PAYMENT_CALLBACK_SECRET:}
    iyzico:
      api-key: ${IYZICO_API_KEY:}
      secret-key: ${IYZICO_SECRET_KEY:}
      base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
      callback-url: ${IYZICO_CALLBACK_URL:}
      locale: ${IYZICO_LOCALE:tr}
      enabled-installments: ${IYZICO_ENABLED_INSTALLMENTS:1}
      force-three-ds: ${IYZICO_FORCE_THREE_DS:0}
      default-buyer-identity-number: ${IYZICO_DEFAULT_BUYER_IDENTITY_NUMBER:11111111111}
      default-buyer-ip: ${IYZICO_DEFAULT_BUYER_IP:127.0.0.1}
      # Callback imzasi yoksa odemeyi reddet. iyzico'nun her zaman imza dondurdugu teyit edilince
      # (loglardan) true yapilmali; varsayilan false ile mevcut (guvenli) davranis korunur.
      require-callback-signature: ${IYZICO_REQUIRE_CALLBACK_SIGNATURE:false}
  security:
    # Asagidaki degerlerin commit'li bir varsayilani YOKTUR; ortam degiskeniyle saglanmalidir.
    # JWT secret en az 32 bayt olmali (SecurityConfig dogrular) ve verilmezse uygulama baslamaz.
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    admin:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      role: ${ADMIN_ROLE:ADMIN}
      bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    jwt:
      secret: ${JWT_SECRET:}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:120}
      # Admin oturumu daha uzun tutulur (musteri token'i kisa kalir). Varsayilan 12 saat.
      admin-access-token-ttl-minutes: ${JWT_ADMIN_ACCESS_TOKEN_TTL_MINUTES:720}
      issuer: ${JWT_ISSUER:baby-shop-backend}
